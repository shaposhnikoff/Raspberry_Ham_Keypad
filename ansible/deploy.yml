---
- name: Deploy Radio Key Daemon to Raspberry Pi
  hosts: raspberry_pi
  become: true
  gather_facts: true

  vars:
    radio_key_daemon_repo_url: "https://github.com/shaposhnikoff/Raspberry_Ham_Keypad.git"
    radio_key_daemon_version: "main"

    radio_key_daemon_user: "pi"
    radio_key_daemon_group: "input"
    radio_key_daemon_extra_groups:
      - input
      - dialout

    radio_key_daemon_install_dir: "/home/{{ radio_key_daemon_user }}/radio-key-daemon"
    radio_key_daemon_config_src: "../ftdx10/ftdx10_keypad_full_config.yaml"
    radio_key_daemon_config_path: "{{ radio_key_daemon_install_dir }}/config.yaml"
    radio_key_daemon_overwrite_config: false

    radio_key_daemon_web_enabled: true
    radio_key_daemon_web_host: "0.0.0.0"
    radio_key_daemon_web_port: 8765
    radio_key_daemon_allow_command_run: true
    radio_key_daemon_allow_service_restart: false
    radio_key_daemon_service_name: "radio-key-daemon.service"

    radio_key_daemon_deploy_ftdx10_tools: true
    radio_key_daemon_radio_dir: "/home/{{ radio_key_daemon_user }}/radio"

    radio_key_daemon_install_rigctld_service: false
    rigctld_service_name: "rigctld.service"
    rigctld_model: "1042"
    rigctld_device: "/dev/ttyUSB0"
    rigctld_baud: "38400"
    rigctld_bind: "127.0.0.1"
    rigctld_port: "4532"

    radio_key_daemon_apt_packages:
      - git
      - hamlib-utils
      - python3
      - python3-evdev
      - python3-yaml

  pre_tasks:
    - name: Assert supported OS family
      ansible.builtin.assert:
        that:
          - ansible_os_family == "Debian"
        fail_msg: "This playbook targets Raspberry Pi OS or another Debian-family OS."

    - name: Assert required variables are set
      ansible.builtin.assert:
        that:
          - radio_key_daemon_user | length > 0
          - radio_key_daemon_install_dir | length > 0
          - radio_key_daemon_config_path | length > 0
          - radio_key_daemon_web_port | int > 0

  tasks:
    - name: Install runtime packages
      ansible.builtin.apt:
        name: "{{ radio_key_daemon_apt_packages }}"
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Add service user to input and serial groups
      ansible.builtin.user:
        name: "{{ radio_key_daemon_user }}"
        groups: "{{ radio_key_daemon_extra_groups }}"
        append: true

    - name: Create application directory
      ansible.builtin.file:
        path: "{{ radio_key_daemon_install_dir }}"
        state: directory
        owner: "{{ radio_key_daemon_user }}"
        group: "{{ radio_key_daemon_user }}"
        mode: "0755"

    - name: Checkout application repository
      ansible.builtin.git:
        repo: "{{ radio_key_daemon_repo_url }}"
        dest: "{{ radio_key_daemon_install_dir }}"
        version: "{{ radio_key_daemon_version }}"
        update: true
      become: true
      become_user: "{{ radio_key_daemon_user }}"

    - name: Ensure application tree ownership
      ansible.builtin.file:
        path: "{{ radio_key_daemon_install_dir }}"
        state: directory
        owner: "{{ radio_key_daemon_user }}"
        group: "{{ radio_key_daemon_user }}"
        recurse: true

    - name: Install keypad config when missing or explicitly requested
      ansible.builtin.copy:
        src: "{{ radio_key_daemon_config_src }}"
        dest: "{{ radio_key_daemon_config_path }}"
        owner: "{{ radio_key_daemon_user }}"
        group: "{{ radio_key_daemon_user }}"
        mode: "0644"
        force: "{{ radio_key_daemon_overwrite_config }}"

    - name: Create radio helper directory
      ansible.builtin.file:
        path: "{{ radio_key_daemon_radio_dir }}"
        state: directory
        owner: "{{ radio_key_daemon_user }}"
        group: "{{ radio_key_daemon_user }}"
        mode: "0755"
      when: radio_key_daemon_deploy_ftdx10_tools

    - name: Install FTDX10 helper scripts
      ansible.builtin.copy:
        src: "{{ radio_key_daemon_install_dir }}/ftdx10/{{ item.name }}"
        dest: "{{ radio_key_daemon_radio_dir }}/{{ item.name }}"
        owner: "{{ radio_key_daemon_user }}"
        group: "{{ radio_key_daemon_user }}"
        mode: "{{ item.mode }}"
        remote_src: true
      loop:
        - name: ftdx10_cat.py
          mode: "0755"
        - name: beacon.sh
          mode: "0755"
      when: radio_key_daemon_deploy_ftdx10_tools

    - name: Install radio key daemon systemd unit
      ansible.builtin.template:
        src: templates/radio-key-daemon.service.j2
        dest: "/etc/systemd/system/{{ radio_key_daemon_service_name }}"
        owner: root
        group: root
        mode: "0644"
      notify:
        - Reload systemd
        - Restart radio key daemon

    - name: Validate radio key daemon config
      ansible.builtin.command:
        cmd: "/usr/bin/python3 -m radio_key_daemon --config {{ radio_key_daemon_config_path }} --show-bindings"
        chdir: "{{ radio_key_daemon_install_dir }}"
      changed_when: false

    - name: Enable and start radio key daemon
      ansible.builtin.systemd:
        name: "{{ radio_key_daemon_service_name }}"
        enabled: true
        state: started
        daemon_reload: true

    - name: Install rigctld defaults
      ansible.builtin.template:
        src: templates/rigctld.default.j2
        dest: /etc/default/rigctld
        owner: root
        group: root
        mode: "0644"
      notify:
        - Restart rigctld
      when: radio_key_daemon_install_rigctld_service

    - name: Install rigctld systemd unit
      ansible.builtin.template:
        src: templates/rigctld.service.j2
        dest: "/etc/systemd/system/{{ rigctld_service_name }}"
        owner: root
        group: root
        mode: "0644"
      notify:
        - Reload systemd
        - Restart rigctld
      when: radio_key_daemon_install_rigctld_service

    - name: Enable and start rigctld
      ansible.builtin.systemd:
        name: "{{ rigctld_service_name }}"
        enabled: true
        state: started
        daemon_reload: true
      when: radio_key_daemon_install_rigctld_service

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart radio key daemon
      ansible.builtin.systemd:
        name: "{{ radio_key_daemon_service_name }}"
        state: restarted

    - name: Restart rigctld
      ansible.builtin.systemd:
        name: "{{ rigctld_service_name }}"
        state: restarted
