name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      python: ${{ steps.filter.outputs.python }}
      yaml: ${{ steps.filter.outputs.yaml }}
      shell: ${{ steps.filter.outputs.shell }}
      docker: ${{ steps.filter.outputs.docker }}
      terraform: ${{ steps.filter.outputs.terraform }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            python:
              - '**/*.py'
              - 'pyproject.toml'
              - 'requirements*.txt'
              - 'uv.lock'
            yaml:
              - '**/*.yml'
              - '**/*.yaml'
            shell:
              - 'scripts/**'
              - '**/*.sh'
              - '**/*.bash'
            docker:
              - '**/Dockerfile'
              - '**/Dockerfile.*'
              - '**/*.dockerfile'
            terraform:
              - '**/*.tf'
              - '**/*.tfvars'
              - '**/.terraform.lock.hcl'

  lint:
    name: Lint
    needs: changes
    uses: shaposhnikoff/my_shared_pipeline/.github/workflows/shared-lint.yml@main
    with:
      python-version: "3.11"
      terraform-version: "1.9.x"
      working-directory: "."
    secrets: inherit

  security:
    name: Security
    needs: lint
    uses: shaposhnikoff/my_shared_pipeline/.github/workflows/shared-security.yml@main
    with:
      working-directory: "."
      fail-on-severity: "HIGH"
    secrets: inherit
